services:
  nextcloud:
    image: kefaslungu/hng-nextcloud:latest
    container_name: hng-nextcloud
    restart: unless-stopped
    networks:
      - hng-net
    environment:
      - TZ=UTC
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro

  nginx:
    image: nginx:alpine
    container_name: hng-nginx
    restart: unless-stopped
    depends_on:
      - nextcloud
    ports:
      - "80:80"
    networks:
      - hng-net
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx

  detector:
    build:
      context: ./detector
      dockerfile: Dockerfile
    container_name: hng-detector
    restart: unless-stopped
    depends_on:
      - nginx
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./detector:/app
      - HNG-nginx-logs:/var/log/nginx:ro
    command: ["python", "main.py"]

volumes:
  HNG-nginx-logs:
    name: HNG-nginx-logs

networks:
  hng-net:
    driver: bridge
